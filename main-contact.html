<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me - My Dev Journey</title>
    <link rel="stylesheet" href="main-style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Logo</div>
        <ul class="nav-links">
            <li><a href="main-home.html">Home</a></li>
            <li><a href="main-about.html">About</a></li>
            <li><a href="main-services.html">Services</a></li>
            <li><a href="main-contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="contact-section">
        <div class="contact-container">
            
            <div class="contact-info">
                <h1>Get in <span class="highlight">Touch</span></h1>
                <p>Have a project in mind or just want to say hi? Feel free to message me!</p>
                
                <div class="info-item">
                    <span>📍</span>
                    <p>Kathmandu, Nepal</p>
                </div>
                <div class="info-item">
                    <span>📧</span>
                    <p>support@demo.com.np</p>
                </div>
                <div class="info-item">
                    <span>📱</span>
                    <p>+977-9812345678</p>
                </div>
            </div>

            <div class="contact-form-card">
                <form action="#">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Your Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="Your Email" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Your Message..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

        </div>
    </section>

</body>
</html>
